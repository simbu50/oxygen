name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  backend:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: oxygen
          POSTGRES_PASSWORD: oxygen
          POSTGRES_DB: oxygen_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U oxygen"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    defaults:
      run:
        working-directory: ./backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json
      - run: npm ci
      - run: npx prisma generate
      - run: npx prisma migrate deploy
        env:
          DATABASE_URL: postgresql://oxygen:oxygen@localhost:5432/oxygen_test
      - run: npm run lint
      - run: npm run build
      - run: npm test -- --passWithNoTests
        env:
          DATABASE_URL: postgresql://oxygen:oxygen@localhost:5432/oxygen_test
          JWT_ACCESS_SECRET: test-secret-test-secret-test-secret-32
          JWT_REFRESH_SECRET: test-refresh-test-refresh-test-32-byte
          PII_ENCRYPTION_KEY: 0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef

  admin-web:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./admin-web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: admin-web/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm run build

  mobile:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./mobile
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'
          channel: 'stable'
      - run: flutter pub get
      - run: flutter analyze
      - run: flutter test
